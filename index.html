  <title>NAVRATNA | Premium Dining Experience</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            maroon: '#5A1E1E',
            charcoal: '#1C1C1C',
            gold: '#C9A24D',
            cream: '#F8F5F0',
            muted: '#6B7280',

    }

  <style>

      background: #F8F5F0;
    }

    ::-webkit-scrollbar-thumb {
      background: #C9A24D;
      border-radius: 4px;
